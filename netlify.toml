[build]
  base = "/"
  command = "npm install && npm run build"
  publish = "docs"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  included_files = ["src/data/**", "dist/**"]
  node_bundler = "esbuild"

# Redirect /api/audit → Netlify Function
[[redirects]]
  from = "/api/audit"
  to = "/.netlify/functions/audit"
  status = 200

# SPA fallback — serve index.html for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
